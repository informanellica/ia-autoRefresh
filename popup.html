<!DOCTYPE html>
<html lang="ja" data-theme="light">
<head>
  <meta charset="UTF-8">
  <style>
    /* ---- Bootstrap-aligned color tokens ---- */
    :root {
      --bs-success: #198754;
      --bs-success-hover: #157347;
      --bs-danger: #dc3545;
      --bs-danger-hover: #bb2d3b;
      --bs-primary: #0d6efd;
    }

    [data-theme="light"] {
      --bg: #ffffff;
      --bg-elev: #f8f9fa;
      --text: #212529;
      --text-muted: #6c757d;
      --border: #dee2e6;
      --input-bg: #ffffff;
      --hover-bg: #e9ecef;
      --success-text: #0f5132;
      --success-bg: #d1e7dd;
      --success-border: #badbcc;
    }

    [data-theme="dark"] {
      --bg: #212529;
      --bg-elev: #2b3035;
      --text: #dee2e6;
      --text-muted: #adb5bd;
      --border: #495057;
      --input-bg: #2b3035;
      --hover-bg: #343a40;
      --success-text: #75b798;
      --success-bg: rgba(25, 135, 84, 0.2);
      --success-border: rgba(25, 135, 84, 0.45);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 16px;
      transition: background 0.15s, color 0.15s;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    h1 {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
    }

    /* ---- theme toggle: single button, icon reflects current theme ---- */
    [data-theme="dark"] #themeToggle .icon-sun {
      display: none;
    }

    [data-theme="light"] #themeToggle .icon-moon {
      display: none;
    }

    .status {
      text-align: center;
      font-size: 12px;
      padding: 6px 10px;
      border-radius: 6px;
      margin-bottom: 14px;
      font-weight: 500;
    }

    .status.active {
      background: var(--success-bg);
      color: var(--success-text);
      border: 1px solid var(--success-border);
    }

    .status.inactive {
      background: var(--bg-elev);
      color: var(--text-muted);
      border: 1px solid var(--border);
    }

    .preset-label {
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .presets {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      margin-bottom: 14px;
    }

    .preset-btn {
      padding: 7px 0;
      border: 1px solid var(--border);
      background: var(--bg-elev);
      color: var(--text);
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      transition: all 0.15s;
    }

    .preset-btn:hover {
      background: var(--hover-bg);
      border-color: var(--bs-primary);
    }

    .preset-btn.selected {
      background: var(--bs-primary);
      border-color: var(--bs-primary);
      color: #fff;
    }

    .custom-row {
      display: flex;
      gap: 6px;
      margin-bottom: 14px;
      align-items: center;
    }

    .custom-row label {
      font-size: 11px;
      color: var(--text-muted);
      white-space: nowrap;
    }

    .custom-row input {
      flex: 1;
      padding: 6px 8px;
      border: 1px solid var(--border);
      background: var(--input-bg);
      color: var(--text);
      border-radius: 6px;
      font-size: 13px;
      outline: none;
      width: 60px;
    }

    .custom-row input:focus {
      border-color: var(--bs-primary);
      box-shadow: 0 0 0 0.2rem rgba(13, 110, 253, 0.25);
    }

    .custom-row select {
      padding: 6px 4px;
      border: 1px solid var(--border);
      background: var(--input-bg);
      color: var(--text);
      border-radius: 6px;
      font-size: 12px;
      outline: none;
    }

    .btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-start {
      background: var(--bs-success);
      color: #fff;
    }

    .btn-start:hover {
      background: var(--bs-success-hover);
    }

    .btn-stop {
      background: var(--bs-danger);
      color: #fff;
    }

    .btn-stop:hover {
      background: var(--bs-danger-hover);
    }

    .footer {
      text-align: center;
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 12px;
    }

    .footer a {
      color: var(--bs-primary);
      text-decoration: none;
    }

    .footer a:hover {
      text-decoration: underline;
    }

    /* ---- header actions + settings icon ---- */
    .header-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .icon-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 26px;
      border: 1px solid var(--border);
      background: var(--bg-elev);
      color: var(--text-muted);
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .icon-btn:hover {
      background: var(--hover-bg);
      color: var(--text);
    }

    .icon-btn svg {
      width: 15px;
      height: 15px;
    }

    /* ---- settings view ---- */
    .settings-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
    }

    .settings-header h2 {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
    }

    .preset-editor {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 10px;
    }

    .preset-row {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .preset-row input {
      flex: 1;
      min-width: 0;
      padding: 6px 8px;
      border: 1px solid var(--border);
      background: var(--input-bg);
      color: var(--text);
      border-radius: 6px;
      font-size: 13px;
      outline: none;
    }

    .preset-row select {
      padding: 6px 4px;
      border: 1px solid var(--border);
      background: var(--input-bg);
      color: var(--text);
      border-radius: 6px;
      font-size: 12px;
      outline: none;
    }

    .preset-row input:focus,
    .preset-row select:focus {
      border-color: var(--bs-primary);
    }

    .del-btn {
      width: 30px;
      height: 32px;
      border: 1px solid var(--border);
      background: var(--bg-elev);
      color: var(--bs-danger);
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      flex-shrink: 0;
    }

    .del-btn:hover {
      background: var(--hover-bg);
    }

    .btn-secondary {
      width: 100%;
      padding: 8px;
      border: 1px dashed var(--border);
      background: transparent;
      color: var(--text-muted);
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      margin-bottom: 14px;
      transition: all 0.15s;
    }

    .btn-secondary:hover {
      border-color: var(--bs-primary);
      color: var(--text);
    }

    .setting-toggle {
      margin-bottom: 14px;
      font-size: 12px;
      color: var(--text);
    }

    .setting-toggle label {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      cursor: pointer;
    }

    .setting-toggle input[type="checkbox"] {
      margin-top: 1px;
      accent-color: var(--bs-primary);
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Auto Refresh</h1>
    <div class="header-actions">
      <button id="settingsBtn" class="icon-btn" title="設定" aria-label="設定">
        <!-- Bootstrap Icons: gear-fill -->
        <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 16 16">
          <path d="M9.405 1.05c-.413-1.4-2.397-1.4-2.81 0l-.1.34a1.464 1.464 0 0 1-2.105.872l-.31-.17c-1.283-.698-2.686.705-1.987 1.987l.169.311c.446.82.023 1.841-.872 2.105l-.34.1c-1.4.413-1.4 2.397 0 2.81l.34.1a1.464 1.464 0 0 1 .872 2.105l-.17.31c-.698 1.283.705 2.686 1.987 1.987l.311-.169a1.464 1.464 0 0 1 2.105.872l.1.34c.413 1.4 2.397 1.4 2.81 0l.1-.34a1.464 1.464 0 0 1 2.105-.872l.31.17c1.283.698 2.686-.705 1.987-1.987l-.169-.311a1.464 1.464 0 0 1 .872-2.105l.34-.1c1.4-.413 1.4-2.397 0-2.81l-.34-.1a1.464 1.464 0 0 1-.872-2.105l.17-.31c.698-1.283-.705-2.686-1.987-1.987l-.311.169a1.464 1.464 0 0 1-2.105-.872zM8 10.93a2.929 2.929 0 1 1 0-5.86 2.929 2.929 0 0 1 0 5.858z"/>
        </svg>
      </button>
      <button id="themeToggle" class="icon-btn" title="テーマ切替" aria-label="テーマ切替">
        <!-- Bootstrap Icons: sun-fill (shown in light mode) -->
        <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 16 16">
          <path d="M8 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8M8 0a.5.5 0 0 1 .5.5v2a.5.5 0 0 1-1 0v-2A.5.5 0 0 1 8 0m0 13a.5.5 0 0 1 .5.5v2a.5.5 0 0 1-1 0v-2A.5.5 0 0 1 8 13m8-5a.5.5 0 0 1-.5.5h-2a.5.5 0 0 1 0-1h2a.5.5 0 0 1 .5.5M3 8a.5.5 0 0 1-.5.5h-2a.5.5 0 0 1 0-1h2A.5.5 0 0 1 3 8m10.657-5.657a.5.5 0 0 1 0 .707l-1.414 1.415a.5.5 0 1 1-.707-.708l1.414-1.414a.5.5 0 0 1 .707 0m-9.193 9.193a.5.5 0 0 1 0 .707L3.05 13.657a.5.5 0 0 1-.707-.707l1.414-1.414a.5.5 0 0 1 .707 0m9.193 2.121a.5.5 0 0 1-.707 0l-1.414-1.414a.5.5 0 0 1 .707-.707l1.414 1.414a.5.5 0 0 1 0 .707M4.464 4.465a.5.5 0 0 1-.707 0L2.343 3.05a.5.5 0 1 1 .707-.708l1.414 1.415a.5.5 0 0 1 0 .707z"/>
        </svg>
        <!-- Bootstrap Icons: moon-stars-fill (shown in dark mode) -->
        <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 16 16">
          <path d="M6 .278a.77.77 0 0 1 .08.858 7.2 7.2 0 0 0-.878 3.46c0 4.021 3.278 7.277 7.318 7.277q.792-.001 1.533-.16a.79.79 0 0 1 .81.316.73.73 0 0 1-.031.893A8.35 8.35 0 0 1 8.344 16C3.734 16 0 12.286 0 7.71 0 4.266 2.114 1.312 5.124.06A.75.75 0 0 1 6 .278"/>
          <path d="M10.794 3.148a.217.217 0 0 1 .412 0l.387 1.162c.173.518.579.924 1.097 1.097l1.162.387a.217.217 0 0 1 0 .412l-1.162.387a1.73 1.73 0 0 0-1.097 1.097l-.387 1.162a.217.217 0 0 1-.412 0l-.387-1.162A1.73 1.73 0 0 0 9.5 6.593l-1.162-.387a.217.217 0 0 1 0-.412l1.162-.387a1.73 1.73 0 0 0 1.097-1.097z"/>
        </svg>
      </button>
    </div>
  </div>

  <div id="mainView">
  <div id="status" class="status inactive">停止中</div>

  <div class="preset-label">プリセット</div>
  <div class="presets" id="presets"></div>

  <div class="custom-row">
    <label>カスタム:</label>
    <input type="number" id="customValue" min="1" value="15" />
    <select id="customUnit">
      <option value="1">秒</option>
      <option value="60" selected>分</option>
    </select>
  </div>

  <button id="toggleBtn" class="btn btn-start">開始</button>
  </div>

  <div id="settingsView" hidden>
    <div class="settings-header">
      <button id="backBtn" class="icon-btn" title="戻る" aria-label="戻る">
        <!-- Bootstrap Icons: arrow-left -->
        <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 16 16">
          <path d="M15 8a.5.5 0 0 0-.5-.5H2.707l3.147-3.146a.5.5 0 1 0-.708-.708l-4 4a.5.5 0 0 0 0 .708l4 4a.5.5 0 0 0 .708-.708L2.707 8.5H14.5A.5.5 0 0 0 15 8"/>
        </svg>
      </button>
      <h2>設定</h2>
    </div>

    <div class="preset-label">プリセット編集</div>
    <div id="presetEditor" class="preset-editor"></div>
    <button id="addPresetBtn" class="btn-secondary">＋ プリセットを追加</button>

    <div class="preset-label">再起動時の動作</div>
    <div class="setting-toggle">
      <label>
        <input type="checkbox" id="rememberToggle" />
        状態を記憶しない（再起動後に自動再開しない）
      </label>
    </div>

    <button id="saveSettingsBtn" class="btn btn-start">保存</button>
  </div>

  <div class="footer">
    by <a href="https://informanellica.com" target="_blank" rel="noopener noreferrer">informanellica</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
