<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Auto Refresh | Informanellica</title>
  <meta name="description" content="Automatically reload any tab at the interval you choose." data-i18n-content="desc">
  <link rel="icon" href="./assets/icon.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

<body>
<header>
  <div class="navbar navbar-dark bg-dark shadow-sm">
    <div class="container">
      <a href="https://informanellica.github.io/" class="navbar-brand d-flex align-items-center">
        <i class="bi bi-collection me-2"></i><strong>Informanellica Software</strong>
      </a>
      <div class="d-flex align-items-center gap-3">
        <span id="lang-switcher"></span>
        <a href="https://informanellica.github.io/" class="text-light text-decoration-none small"><i class="bi bi-grid me-1"></i><span data-i18n="apps">アプリ一覧</span></a>
        <a href="https://informanellica.github.io/support.html#auto-refresh" class="text-light text-decoration-none small"><i class="bi bi-life-preserver me-1"></i><span data-i18n="support">サポート</span></a>
      </div>
    </div>
  </div>
</header>

<main class="container py-5">
  <div class="row align-items-center g-5">
    <div class="col-lg-5">
      <img src="./assets/icon.png" alt="Auto Refresh" width="72" height="72" class="mb-3">
      <h1 class="fw-bold">Auto Refresh</h1>
      <p class="fs-5 text-body-secondary" data-i18n="tagline">タブを自動で再読み込み</p>
      <p data-i18n="desc">指定した間隔でタブを自動再読み込み。タブごとに設定でき、プリセット・カスタム間隔・ひと目で分かるバッジ付き。</p>
      <div class="d-flex flex-wrap gap-2 my-3">
        <a href="https://github.com/informanellica/ia-autoRefresh/releases/latest" class="btn btn-primary">
          <i class="bi bi-download me-1"></i><span data-i18n="releases">ダウンロード（リリース）</span>
        </a>
        <a href="https://github.com/informanellica/ia-autoRefresh" class="btn btn-outline-secondary">
          <i class="bi bi-github me-1"></i><span data-i18n="source">ソースコード</span>
        </a>
        <a href="./PRIVACY" class="btn btn-outline-secondary">
          <i class="bi bi-shield-check me-1"></i><span data-i18n="privacy">プライバシーポリシー</span>
        </a>
      </div>
      <p class="small text-body-secondary" data-i18n="note">Chrome・Edge 対応 · データ収集なし · オープンソース</p>
    </div>
    <div class="col-lg-7">
      <img src="./assets/screenshot.png" alt="Auto Refresh" class="img-fluid rounded-3 shadow-sm border">
    </div>
  </div>

<footer class="text-body-secondary py-4 border-top">
  <div class="container">
    <p class="mb-0">© Informanellica · <a href="https://informanellica.github.io/" class="text-body-secondary" data-i18n="apps">アプリ一覧</a></p>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
